<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Checkout | El Prado Burguer</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="../assets/css/checkout.css">

<script defer
src="../assets/js/storage.js"></script>

<script defer
src="../assets/js/checkout.js"></script>

</head>

<body>

<header class="header">

<div class="container">

<a href="../index.html"
class="logo">

<img
src="../assets/img/logo.png"
alt="El Prado Burguer">

</a>

<div class="header-titulo">

Finalizar Pedido

</div>

<a
href="cardapio.html"
class="btn-voltar">

← Voltar

</a>

</div>

</header>

<main>

<section class="checkout">

<div class="container">

<div class="checkout-grid">

<!-- ===================== -->
<!-- DADOS DO CLIENTE -->
<!-- ===================== -->

<div class="checkout-form">

<h2>

Dados do Cliente

</h2>

<div class="campo">

<label>

Nome Completo

</label>

<input

type="text"

id="nome"

placeholder="Seu nome">

</div>

<div class="campo">

<label>

Telefone

</label>

<input

type="tel"

id="telefone"

placeholder="(11) 99999-9999">

</div>

<div class="campo">

<label>

CEP

</label>

<input

type="text"

id="cep"

placeholder="00000-000">

</div>

<div class="campo">

<label>

Endereço

</label>

<input

type="text"

id="endereco"

placeholder="Rua...">

</div>

<div class="duas-colunas">

<div class="campo">

<label>

Número

</label>

<input

type="text"

id="numero">

</div>

<div class="campo">

<label>

Complemento

</label>

<input

type="text"

id="complemento">

</div>

</div>

<div class="campo">

<label>

Bairro

</label>

<input

type="text"

id="bairro">

</div>

<div class="campo">

<label>

Cidade

</label>

<input

type="text"

id="cidade">

</div>

<div class="campo">

<label>

Observações

</label>

<textarea

id="observacoes"

rows="4"

placeholder="Ex.: sem cebola, tocar interfone...">

</textarea>

</div>

</div>
<!-- ===================== -->
<!-- ENTREGA -->
<!-- ===================== -->

<div class="checkout-resumo">

<h2>

Entrega

</h2>

<div class="opcoes-entrega">

<label class="opcao">

<input
type="radio"
name="entrega"
value="delivery"
checked>

<span>

🚚 Delivery

</span>

</label>

<label class="opcao">

<input
type="radio"
name="entrega"
value="retirada">

<span>

🏪 Retirar no Local

</span>

</label>

</div>

<!-- ===================== -->
<!-- PAGAMENTO -->
<!-- ===================== -->

<h2>

Forma de Pagamento

</h2>

<div class="pagamentos">

<label class="opcao">

<input
type="radio"
name="pagamento"
value="pix"
checked>

<span>

💳 Pix

</span>

</label>

<label class="opcao">

<input
type="radio"
name="pagamento"
value="credito">

<span>

💳 Crédito

</span>

</label>

<label class="opcao">

<input
type="radio"
name="pagamento"
value="debito">

<span>

💳 Débito

</span>

</label>

<label class="opcao">

<input
type="radio"
name="pagamento"
value="dinheiro">

<span>

💵 Dinheiro

</span>

</label>

</div>

<!-- ===================== -->
<!-- RESUMO -->
<!-- ===================== -->

<h2>

Resumo do Pedido

</h2>

<div
id="listaResumo"
class="lista-resumo">

<!-- checkout.js -->

</div>

<div class="totais">

<div>

<span>

Subtotal

</span>

<strong id="subtotal">

R$ 0,00

</strong>

</div>

<div>

<span>

Entrega

</span>

<strong id="taxaEntrega">

A calcular

</strong>

</div>

<div class="total">

<span>

Total

</span>

<strong id="totalPedido">

R$ 0,00

</strong>

</div>

</div>

<button

id="btnFinalizar"

class="btn-finalizar">

Finalizar Pedido

</button>

</div>

</div>

</div>

</section>

</main>

<footer class="footer">

<div class="container">

<p>

© 2026 El Prado Burguer

Todos os direitos reservados.

</p>

</div>

</footer>

</body>

</html>
